appId: com.zvipexx.dawn
productName: macos client
electronVersion: 10.4.7
directories:
  output: "build"
npmRebuild: false
asarUnpack:
  - "**/node_modules/ffmpeg-static/**"
win:
  target:
    - target: nsis
  icon: "src/assets/img/icon.png"
  artifactName: "${name}-setup-win-${version}.${ext}"
mac:
  target: dmg
  icon: "src/assets/img/icon.icns"
  category: public.app-category.games
  extendInfo:
    LSSupportsGameMode: true
  artifactName: "${name}-setup-mac-${version}.${ext}"
linux:
  target:
    - AppImage
    - tar.gz
  category: Game
  icon: "src/assets/img/icon.png"
  artifactName: "${name}-${version}-linux-${arch}.${ext}"
publish:
  - provider: github
    owner: xapqrt
    repo: macos
    releaseType: release